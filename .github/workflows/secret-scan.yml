name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GitHub secrets are absent
        run: ./scripts/scan-github-secrets.sh all
